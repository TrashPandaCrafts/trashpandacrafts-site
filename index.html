<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trash Panda Crafts</title>
    <style>
        /* --- Load the Custom Font --- */
        @font-face {
            font-family: 'Sketch Block';
            src: url('sketch_block.ttf') format('truetype');
        }

        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #121212; 
            color: #e0e0e0; 
            margin: 0;
            padding: 50px;
        }
        
        .container {
            max-width: 1600px; 
            margin: 0 auto;
        }
        
        /* --- Banner & Title Styling --- */
        .banner {
            width: 100%; 
            border-radius: 8px; 
            margin-bottom: 20px; 
        }

        .title-image {
            width: 100%;
            max-width: 800px; 
            margin: 10px auto; 
            display: block; 
        }

        .subtitle {
            font-family: 'Sketch Block', Arial, sans-serif; 
            font-size: 1.5em; 
            color: #b0b0b0;
            margin-bottom: 40px;
            line-height: 1.5; 
            max-width: 800px; 
            margin-left: auto;
            margin-right: auto;
        }

        /* --- Clickable Username Tabs --- */
        .feed-toggles {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
        }

        .toggle-btn {
            background-color: #1e1e1e;
            color: #888;
            border: 2px solid #444;
            padding: 10px 25px;
            font-size: 1.2em;
            font-family: 'Sketch Block', Arial, sans-serif;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .toggle-btn:hover {
            color: #e0e0e0;
            border-color: #66b3ff;
        }

        /* Styling for whichever tab is currently selected */
        .toggle-btn.active {
            background-color: #66b3ff;
            color: #121212;
            border-color: #66b3ff;
        }

        /* --- Feed Container Styling --- */
        .ig-placeholder {
            border: 2px dashed #444; 
            padding: 40px 20px; 
            background-color: #1e1e1e; 
            border-radius: 8px; 
        }
        
        /* Hides the inactive feed */
        .feed-wrapper {
            display: none;
        }

        /* Shows the active feed */
        .feed-wrapper.active {
            display: block;
        }
        
        a {
            color: #66b3ff;
        }
        a:hover {
            color: #99ccff;
        }
        
        /* LightWidget specific fix to ensure iframes size correctly */
        .lightwidget-widget {
            width: 100%;
            border: 0;
            overflow: hidden;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="banner.png" alt="Trash Panda Crafts Banner" class="banner">

        <img src="titlepage.png" alt="Welcome to Trash Panda Crafts" class="title-image">
        
        <p class="subtitle">I'm just a regular dad, digging through the recycling bin so you don't have to. I find the hidden art in boxes, junk, & scraps, then punch them into 1-inch stamps and like my occasional random beer! Hope to see you again and hope you join me in my journey to find peace through my hobby.</p>
        
        <div class="feed-toggles">
            <button id="btn-crafts" class="toggle-btn active" onclick="switchFeed('crafts')">@TrashPandaCraftsHTX</button>
            <button id="btn-drinks" class="toggle-btn" onclick="switchFeed('drinks')">@TrashPandaDrinks</button>
        </div>

        <div class="ig-placeholder">
            <div id="feed-crafts" class="feed-wrapper active">
                
                <script src="https://cdn.lightwidget.com/widgets/lightwidget.js"></script><iframe src="https://lightwidget.com/widgets/33f07f9c04cf5920a9acceab44c400a3.html" scrolling="no" allowtransparency="true" class="lightwidget-widget" style="width:100%;border:0;overflow:hidden;"></iframe>
                
            </div>

            <div id="feed-drinks" class="feed-wrapper">
                
                </div>
        </div>
    </div>

    <script>
        function switchFeed(feedType) {
            // Get the feed containers
            const craftsFeed = document.getElementById('feed-crafts');
            const drinksFeed = document.getElementById('feed-drinks');
            
            // Get the buttons
            const craftsBtn = document.getElementById('btn-crafts');
            const drinksBtn = document.getElementById('btn-drinks');

            // Logic for switching to the Crafts feed
            if (feedType === 'crafts') {
                craftsFeed.classList.add('active');
                drinksFeed.classList.remove('active');
                
                craftsBtn.classList.add('active');
                drinksBtn.classList.remove('active');
            } 
            // Logic for switching to the Drinks feed
            else if (feedType === 'drinks') {
                drinksFeed.classList.add('active');
                craftsFeed.classList.remove('active');
                
                drinksBtn.classList.add('active');
                craftsBtn.classList.remove('active');
            }
        }
    </script>
</body>
</html>
