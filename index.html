<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trash Panda Crafts</title>

    <link rel="icon" type="image/jpeg" href="favicon.jpg">

    <style>
        /* --- Load the Custom Font --- */
        @font-face {
            font-family: 'Sketch Block';
            src: url('sketch_block.ttf') format('truetype');
        }

        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #121212; 
            color: #e0e0e0; 
            margin: 0;
            padding: 50px; /* Standard desktop padding */
        }
        
        .container {
            max-width: 1600px; 
            margin: 0 auto;
        }
        
        /* --- Banner & Title Styling --- */
        .banner {
            width: 100%; 
            border-radius: 8px; 
            margin-bottom: 20px; 
        }

        .title-image {
            width: 100%;
            max-width: 800px; 
            margin: 10px auto; 
            display: block; 
        }

        .subtitle {
            font-family: 'Sketch Block', Arial, sans-serif; 
            font-size: 1.5em; 
            color: #b0b0b0;
            margin-bottom: 40px;
            line-height: 1.5; 
            max-width: 800px; 
            margin-left: auto;
            margin-right: auto;
        }

        /* --- Clickable Username Tabs --- */
        .feed-toggles {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
        }

        .toggle-btn {
            background-color: #1e1e1e;
            color: #888;
            border: 2px solid #444;
            padding: 10px 25px;
            font-size: 1.2em;
            font-family: 'Sketch Block', Arial, sans-serif;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .toggle-btn:hover {
            color: #e0e0e0;
            border-color: #66b3ff;
        }

        .toggle-btn.active {
            background-color: #66b3ff;
            color: #121212;
            border-color: #66b3ff;
        }

        /* --- Feed Container Styling --- */
        .ig-placeholder {
            border: 2px dashed #444; 
            padding: 40px 20px; 
            background-color: #1e1e1e; 
            border-radius: 8px; 
        }
        
        .feed-wrapper {
            display: none;
        }

        .feed-wrapper.active {
            display: block;
        }
        
        a {
            color: #66b3ff;
        }
        a:hover {
            color: #99ccff;
        }
        
        .lightwidget-widget {
            width: 100%;
            border: 0;
            overflow: hidden;
        }

        /* ---------------------------------------------------- */
        /* --- MOBILE OPTIMIZATIONS (Screens under 600px) --- */
        /* ---------------------------------------------------- */
        @media (max-width: 600px) {
            body {
                padding: 20px 15px; /* Less bulk on the sides */
            }

            .subtitle {
                font-size: 1.1em; /* Scaled down for readability */
                margin-bottom: 30px;
            }

            .feed-toggles {
                flex-direction: column; /* Stack buttons vertically */
                gap: 10px;
                padding: 0 20px;
            }

            .toggle-btn {
                width: 100%; /* Full-width buttons for easier tapping */
                font-size: 1.1em;
            }

            .ig-placeholder {
                padding: 20px 10px; /* Tighter feed container */
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="banner.png" alt="Trash Panda Crafts Banner" class="banner">

        <img src="titlepage.png" alt="Welcome to Trash Panda Crafts" class="title-image">
        
        <p class="subtitle">I'm just a regular dad, digging through the recycling bin so you don't have to. I find the hidden art in boxes, junk, & scraps, then punch them into 1-inch stamps and like my occasional random beer! Hope to see you again and hope you join me in my journey to find peace through my hobby.</p>
        
        <div class="feed-toggles">
            <button id="btn-crafts" class="toggle-btn active" onclick="switchFeed('crafts')">@TrashPandaCraftsHTX</button>
            <button id="btn-drinks" class="toggle-btn" onclick="switchFeed('drinks')">@TrashPandaDrinks</button>
        </div>

        <div class="ig-placeholder">
            <div id="feed-crafts" class="feed-wrapper active">
                <script src="https://cdn.lightwidget.com/widgets/lightwidget.js"></script>
                <iframe src="https://lightwidget.com/widgets/33f07f9c04cf5920a9acceab44c400a3.html" scrolling="no" allowtransparency="true" class="lightwidget-widget"></iframe>
            </div>

            <div id="feed-drinks" class="feed-wrapper">
                <script src="https://cdn.lightwidget.com/widgets/lightwidget.js"></script>
                <iframe src="https://lightwidget.com/widgets/cfba6fb115a9548c90fac8066553be0a.html" scrolling="no" allowtransparency="true" class="lightwidget-widget"></iframe>
            </div>
        </div>
    </div>

    <script>
        function switchFeed(feedType) {
            const craftsFeed = document.getElementById('feed-crafts');
            const drinksFeed = document.getElementById('feed-drinks');
            const craftsBtn = document.getElementById('btn-crafts');
            const drinksBtn = document.getElementById('btn-drinks');

            if (feedType === 'crafts') {
                craftsFeed.classList.add('active');
                drinksFeed.classList.remove('active');
                craftsBtn.classList.add('active');
                drinksBtn.classList.remove('active');
            } else if (feedType === 'drinks') {
                drinksFeed.classList.add('active');
                craftsFeed.classList.remove('active');
                drinksBtn.classList.add('active');
                craftsBtn.classList.remove('active');
            }
        }
    </script>
</body>
</html>
