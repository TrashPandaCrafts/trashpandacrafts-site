<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trash Panda Crafts</title>
    <style>
        /* --- Load the Custom Font --- */
        @font-face {
            font-family: 'Sketch Block';
            src: url('sketch_block.ttf') format('truetype');
        }

        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #121212; 
            color: #e0e0e0; 
            margin: 0;
            padding: 50px;
        }
        
        .container {
            max-width: 1600px; 
            margin: 0 auto;
        }
        
        /* --- Banner & Title Styling --- */
        .banner {
            width: 100%; 
            border-radius: 8px; 
            margin-bottom: 20px; 
        }

        .title-image {
            width: 100%;
            max-width: 800px; 
            margin: 10px auto; 
            display: block; 
        }

        .subtitle {
            font-family: 'Sketch Block', Arial, sans-serif; 
            font-size: 1.5em; 
            color: #b0b0b0;
            margin-bottom: 40px;
            line-height: 1.5; 
            max-width: 800px; 
            margin-left: auto;
            margin-right: auto;
        }

        /* --- Clickable Username Tabs --- */
        .feed-toggles {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
        }

        .toggle-btn {
            background-color: #1e1e1e;
            color: #888;
            border: 2px solid #444;
            padding: 10px 25px;
            font-size: 1.2em;
            font-family: 'Sketch Block', Arial, sans-serif;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .toggle-btn:hover {
            color: #e0e0e0;
            border-color: #66b3ff;
        }

        /* Styling for whichever tab is currently selected */
        .toggle-btn.active {
            background-color: #66b3ff;
            color: #121212;
            border-color: #66b3ff;
        }

        /* --- Feed Container Styling --- */
        .ig-placeholder {
            border: 2px dashed #444; 
            padding: 40px 20px; 
            background-color: #1e1e1e; 
            border-radius: 8px; 
        }
