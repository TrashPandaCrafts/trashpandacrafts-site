<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trash Panda Crafts</title>
    <style>
        /* Import a bold, graffiti-style font from Google */
        @import url('https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap');

        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #121212; 
            color: #e0e0e0; 
            margin: 0;
            padding: 50px;
        }
        .container {
            max-width: 1600px; 
            margin: 0 auto;
        }
        
        .banner {
            width: 100%; 
            border-radius: 8px; 
            margin-bottom: 20px; 
        }

        /* --- New Custom Title Styling --- */
        h1 {
            font-family: 'Luckiest Guy', cursive;
            color: white; /* White text fill */
            font-size: 4em; /* Makes it nice and big */
            margin-top: 10px;
            margin-bottom: 5px;
            letter-spacing: 2px;
            
            /* Creates the thick black outline */
            -webkit-text-stroke: 3px black;
            
            /* Creates the hard drop shadow behind it */
            text-shadow: 6px 6px 0px black;
        }

        /* Adjusted paragraph text under the title to stand out a bit more */
        .subtitle {
            font-size: 1.2em;
            color: #b0b0b0;
            margin-bottom: 30px;
        }

        .ig-placeholder {
            border: 2px dashed #444; 
            padding: 100px 20px;
            margin-top: 30px;
            background-color: #1e1e1e; 
            border-radius: 8px; 
        }
        
        a {
            color: #66b3ff;
        }
        a:hover {
            color: #99ccff;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="banner.png" alt="Trash Panda Crafts Banner" class="banner">

        <h1>Welcome to Trash Panda Crafts</h1>
        <p class="subtitle">Junk journaling, punch-stamping, and paper crafts.</p>
        
        <div class="ig-placeholder">
            <div id="curator-feed-default-feed-layout"><a href="https://curator.io" target="_blank" class="crt-logo crt-tag">Powered by Curator.io</a></div>

            <script type="text/javascript">
            /* curator-feed-default-feed-layout */
            (function(){
            var i,e,d=document,s="script";i=d.createElement("script");i.async=1;i.charset="UTF-8";
            i.src="https://cdn.curator.io/published/2cb2d89a-3c11-4d93-8fdd-6a97c878dca6.js";
            e=d.getElementsByTagName(s)[0];e.parentNode.insertBefore(i, e);
            })();
            </script>
        </div>
    </div>
</body>
</html>
